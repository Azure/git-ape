# Git-Ape Planning Pipeline (Azure DevOps)
# Triggers when a PR adds/modifies deployment artifacts under .azure/deployments/
# Validates the ARM template, runs what-if analysis, and posts the plan as a PR thread.
#
# Triggers:
#   - PR opened or updated against main with .azure/deployments/**/template.json or parameters.json changes
#
# Gating:
#   - Read-only — no Azure mutations.
#   - OIDC via Workload Identity Federation service connection 'git-ape-azure'.
#   - Variable group 'git-ape-azure-secrets' provides AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID.

name: 'git-ape-plan-$(Date:yyyyMMdd)-$(Rev:r)'

trigger: none

pr:
  branches:
    include:
      - main
  paths:
    include:
      - .azure/deployments/**/template.json
      - .azure/deployments/**/parameters.json

variables:
  - group: git-ape-azure-secrets
  - name: azureServiceConnection
    value: git-ape-azure

stages:
  - stage: Plan
    displayName: 'Git-Ape Plan'
    jobs:
      - job: detect_deployments
        displayName: 'Detect changed deployments'
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 0
            persistCredentials: true

          - bash: |
              set -euo pipefail
              TARGET_BRANCH="$(System.PullRequest.TargetBranch)"
              TARGET_BRANCH="${TARGET_BRANCH#refs/heads/}"
              git fetch origin "$TARGET_BRANCH" --depth=0 || true

              CHANGED_FILES=$(git diff --name-only "origin/$TARGET_BRANCH"...HEAD -- \
                '.azure/deployments/*/template.json' \
                '.azure/deployments/*/parameters.json' || true)

              if [[ -z "$CHANGED_FILES" ]]; then
                echo "No deployment changes detected"
                echo "##vso[task.setVariable variable=HAS_DEPLOYMENTS;isOutput=true]false"
                echo "##vso[task.setVariable variable=DEPLOYMENT_IDS;isOutput=true][]"
                exit 0
              fi

              DEPLOYMENT_IDS=$(echo "$CHANGED_FILES" \
                | sed 's|.azure/deployments/\([^/]*\)/.*|\1|' \
                | sort -u \
                | jq -R -s -c 'split("\n") | map(select(. != ""))')

              echo "Detected deployments: $DEPLOYMENT_IDS"
              echo "##vso[task.setVariable variable=HAS_DEPLOYMENTS;isOutput=true]true"
              echo "##vso[task.setVariable variable=DEPLOYMENT_IDS;isOutput=true]$DEPLOYMENT_IDS"
            displayName: 'Find deployment directories with changes'
            name: find

      - job: plan
        displayName: 'Plan'
        dependsOn: detect_deployments
        condition: eq(dependencies.detect_deployments.outputs['find.HAS_DEPLOYMENTS'], 'true')
        pool:
          vmImage: ubuntu-latest
        strategy:
          matrix: $[ dependencies.detect_deployments.outputs['find.DEPLOYMENT_IDS'] ]
        variables:
          deployment_id: ''
        steps:
          - checkout: self
            persistCredentials: true

          - bash: |
              set -euo pipefail
              DEPLOY_DIR=".azure/deployments/$(deployment_id)"

              if [[ ! -f "$DEPLOY_DIR/template.json" ]]; then
                echo "##vso[task.logissue type=error]Template not found: $DEPLOY_DIR/template.json"
                exit 1
              fi

              if [[ -f "$DEPLOY_DIR/parameters.json" ]]; then
                LOCATION=$(jq -r '.parameters.location.value // "eastus"' "$DEPLOY_DIR/parameters.json")
              else
                LOCATION="eastus"
              fi

              echo "##vso[task.setVariable variable=LOCATION]$LOCATION"
              echo "##vso[task.setVariable variable=DEPLOY_DIR]$DEPLOY_DIR"
            displayName: 'Read deployment parameters'

          - bash: |
              set -euo pipefail
              TEMPLATE="$(DEPLOY_DIR)/template.json"
              REQUIRED_TAGS=("Environment" "Project" "ManagedBy" "CreatedDate")
              MISSING_TAGS=""

              HAS_TAG_VAR=$(jq 'has("variables") and (.variables | has("tags"))' "$TEMPLATE")
              if [[ "$HAS_TAG_VAR" == "true" ]]; then
                for TAG in "${REQUIRED_TAGS[@]}"; do
                  TAG_EXISTS=$(jq --arg t "$TAG" '.variables.tags | has($t)' "$TEMPLATE")
                  if [[ "$TAG_EXISTS" != "true" ]]; then
                    MISSING_TAGS="${MISSING_TAGS}Missing required tag: $TAG\n"
                  fi
                done
              fi

              if [[ -n "$MISSING_TAGS" ]]; then
                echo "##vso[task.setVariable variable=TAG_STATUS]failed"
                echo "##vso[task.logissue type=warning]Tag enforcement: missing required tags"
                printf "%b" "$MISSING_TAGS"
              else
                echo "##vso[task.setVariable variable=TAG_STATUS]passed"
                echo "All required tags present"
              fi
            displayName: 'Enforce required tags'

          - task: AzureCLI@2
            displayName: 'Azure login + validate template (OIDC)'
            name: validate
            continueOnError: true
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                RESULT=$(az deployment sub validate \
                  --location "$(LOCATION)" \
                  --template-file "$(DEPLOY_DIR)/template.json" \
                  --parameters @"$(DEPLOY_DIR)/parameters.json" \
                  --output json 2>&1) || true

                ERROR=$(echo "$RESULT" | jq -r '.error // empty' 2>/dev/null || echo "")
                if [[ -n "$ERROR" && "$ERROR" != "null" ]]; then
                  echo "##vso[task.setVariable variable=VALIDATION_STATUS;isOutput=true]failed"
                  echo "$RESULT"
                elif echo "$RESULT" | jq -e . >/dev/null 2>&1; then
                  echo "##vso[task.setVariable variable=VALIDATION_STATUS;isOutput=true]passed"
                else
                  echo "##vso[task.setVariable variable=VALIDATION_STATUS;isOutput=true]failed"
                  echo "$RESULT"
                fi

          - task: AzureCLI@2
            displayName: 'Run what-if analysis'
            condition: eq(variables['validate.VALIDATION_STATUS'], 'passed')
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                WHATIF_OUTPUT=$(az deployment sub what-if \
                  --location "$(LOCATION)" \
                  --template-file "$(DEPLOY_DIR)/template.json" \
                  --parameters @"$(DEPLOY_DIR)/parameters.json" \
                  --no-prompt 2>&1) || true

                mkdir -p "$(Build.ArtifactStagingDirectory)/git-ape-plan"
                printf "%s" "$WHATIF_OUTPUT" > "$(Build.ArtifactStagingDirectory)/git-ape-plan/whatif-$(deployment_id).txt"

          - bash: |
              set -euo pipefail
              # Run open-source IaC scanners (Checkov, ARM-TTK, PSRule).
              # Microsoft Defender for DevOps template analyzer is invoked here as a CLI when available.
              mkdir -p "$(Build.ArtifactStagingDirectory)/git-ape-plan/scans"

              # Checkov
              if ! command -v checkov >/dev/null 2>&1; then
                pip install --quiet checkov || true
              fi
              checkov -f "$(DEPLOY_DIR)/template.json" --framework arm \
                --output sarif --output-file-path "$(Build.ArtifactStagingDirectory)/git-ape-plan/scans" \
                || echo "##vso[task.logissue type=warning]Checkov returned findings"

              # ARM-TTK (PowerShell)
              if command -v pwsh >/dev/null 2>&1; then
                pwsh -NoProfile -Command "
                  if (-not (Get-Module -ListAvailable arm-ttk)) {
                    git clone --depth 1 https://github.com/Azure/arm-ttk.git \$env:HOME/arm-ttk 2>\$null
                    Import-Module \$env:HOME/arm-ttk/arm-ttk/arm-ttk.psd1
                  } else {
                    Import-Module arm-ttk
                  }
                  Test-AzTemplate -TemplatePath '$(DEPLOY_DIR)' | ConvertTo-Json -Depth 5 \
                    | Out-File '$(Build.ArtifactStagingDirectory)/git-ape-plan/scans/arm-ttk.json'
                " || echo "##vso[task.logissue type=warning]ARM-TTK returned findings"
              fi

              # PSRule for Azure
              if command -v pwsh >/dev/null 2>&1; then
                pwsh -NoProfile -Command "
                  if (-not (Get-Module -ListAvailable PSRule.Rules.Azure)) {
                    Install-Module PSRule.Rules.Azure -Force -Scope CurrentUser -AcceptLicense
                  }
                  Assert-PSRule -InputPath '$(DEPLOY_DIR)' -Module PSRule.Rules.Azure \
                    -OutputFormat Json -OutputPath '$(Build.ArtifactStagingDirectory)/git-ape-plan/scans/psrule.json'
                " || echo "##vso[task.logissue type=warning]PSRule returned findings"
              fi
            displayName: 'Run IaC security scans (Checkov, ARM-TTK, PSRule)'
            continueOnError: true

          - bash: |
              set -euo pipefail
              ARCH_FILE="$(DEPLOY_DIR)/architecture.md"
              if [[ -f "$ARCH_FILE" ]]; then
                cp "$ARCH_FILE" "$(Build.ArtifactStagingDirectory)/git-ape-plan/architecture-$(deployment_id).md"
              fi
            displayName: 'Capture architecture diagram'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish plan artifacts'
            condition: always()
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/git-ape-plan'
              artifact: 'git-ape-plan-$(deployment_id)'
              publishLocation: pipeline

          - bash: |
              set -euo pipefail
              # Post plan as PR thread (Azure Repos backend).
              # GitHub-backed pipelines should swap this for a GitHub service-connection task.
              if [[ -z "$SYSTEM_PULLREQUEST_PULLREQUESTID" ]]; then
                echo "Not a PR build; skipping comment."
                exit 0
              fi

              VALIDATION_STATUS="$(validate.VALIDATION_STATUS)"
              VALIDATION_STATUS="${VALIDATION_STATUS:-skipped}"
              TAG_STATUS="$(TAG_STATUS)"

              WHATIF_FILE="$(Build.ArtifactStagingDirectory)/git-ape-plan/whatif-$(deployment_id).txt"
              ARCH_FILE="$(Build.ArtifactStagingDirectory)/git-ape-plan/architecture-$(deployment_id).md"

              BODY="## Git-Ape Plan: \`$(deployment_id)\`\n\n"
              if [[ "$VALIDATION_STATUS" == "passed" ]]; then
                BODY="${BODY}### ✅ Template Validation: Passed\n\n"
              else
                BODY="${BODY}### ❌ Template Validation: ${VALIDATION_STATUS}\n\n"
              fi
              if [[ "$TAG_STATUS" == "passed" ]]; then
                BODY="${BODY}### ✅ Tag Enforcement: Passed\n\n"
              elif [[ "$TAG_STATUS" == "failed" ]]; then
                BODY="${BODY}### ⚠️ Tag Enforcement: Issues Found\n\n"
              fi
              if [[ -f "$ARCH_FILE" ]]; then
                BODY="${BODY}### Architecture\n\n$(cat "$ARCH_FILE")\n\n"
              fi
              if [[ -f "$WHATIF_FILE" ]]; then
                WHATIF_CONTENT=$(cat "$WHATIF_FILE")
                BODY="${BODY}### What-If Analysis\n\n\`\`\`\n${WHATIF_CONTENT}\n\`\`\`\n\n"
              fi

              MARKER="<!-- git-ape-plan:$(deployment_id) -->"
              BODY="${MARKER}\n${BODY}"

              JSON_BODY=$(jq -n --arg c "$BODY" '{
                comments: [{ parentCommentId: 0, content: $c, commentType: 1 }],
                status: 1
              }')

              URL="$(System.CollectionUri)$(System.TeamProject)/_apis/git/repositories/$(Build.Repository.ID)/pullRequests/$(System.PullRequest.PullRequestId)/threads?api-version=7.1"

              curl -sS -X POST "$URL" \
                -H "Authorization: Bearer $(System.AccessToken)" \
                -H "Content-Type: application/json" \
                -d "$JSON_BODY" \
                || echo "##vso[task.logissue type=warning]Failed to post PR thread"
            displayName: 'Post plan as PR thread'
            condition: always()
            env:
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)
