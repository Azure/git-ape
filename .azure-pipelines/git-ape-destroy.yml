# Git-Ape Destroy Pipeline (Azure DevOps)
# Triggers on merge to main when metadata.json status changes to "destroy-requested",
# OR via manual run dispatch (emergency fallback).
# Deletes the Azure resource group for a tracked deployment.
#
# Triggers:
#   - CI on main with .azure/deployments/**/metadata.json or state.json changes
#     (only proceeds if metadata.json status == "destroy-requested")
#   - Manual run with confirmation parameter set to 'destroy'
#
# Gating:
#   - 'azure-destroy' ADO Environment with required reviewer.
#   - Manual run requires `confirmation` parameter == 'destroy' (only allowed value).
#   - OIDC via Workload Identity Federation service connection 'git-ape-azure'.
#   - Variable group 'git-ape-azure-secrets' provides AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID.

name: 'git-ape-destroy-$(Date:yyyyMMdd)-$(Rev:r)'

parameters:
  - name: deploymentId
    displayName: 'Deployment ID (manual dispatch only)'
    type: string
    default: ''
  - name: confirmation
    displayName: 'Type "destroy" to confirm (manual dispatch only)'
    type: string
    default: ''
    values:
      - destroy
      - ''

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - .azure/deployments/**/metadata.json
      - .azure/deployments/**/state.json

pr: none

variables:
  - group: git-ape-azure-secrets
  - name: azureServiceConnection
    value: git-ape-azure

stages:
  - stage: Detect
    displayName: 'Detect destroy requests'
    jobs:
      - job: detect_destroys
        displayName: 'Detect destroy-requested deployments'
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 2
            persistCredentials: true

          - bash: |
              set -euo pipefail
              REASON="$(Build.Reason)"
              MANUAL_ID="${{ parameters.deploymentId }}"
              CONFIRMATION="${{ parameters.confirmation }}"

              if [[ "$REASON" == "Manual" ]]; then
                if [[ "$CONFIRMATION" != "destroy" ]]; then
                  echo "##vso[task.logissue type=error]Manual destroy requires confirmation='destroy'"
                  echo "##vso[task.setVariable variable=HAS_DESTROYS;isOutput=true]false"
                  echo "##vso[task.setVariable variable=DEPLOYMENT_IDS;isOutput=true][]"
                  exit 1
                fi
                if [[ -z "$MANUAL_ID" ]]; then
                  echo "##vso[task.logissue type=error]Manual destroy requires deploymentId"
                  exit 1
                fi
                IDS_JSON=$(jq -n --arg id "$MANUAL_ID" '[$id]')
                echo "Manual destroy: $MANUAL_ID"
                echo "##vso[task.setVariable variable=HAS_DESTROYS;isOutput=true]true"
                echo "##vso[task.setVariable variable=DEPLOYMENT_IDS;isOutput=true]$IDS_JSON"
                exit 0
              fi

              # CI trigger: find deployments where metadata.json status == "destroy-requested"
              CHANGED_FILES=$(git diff --name-only HEAD~1...HEAD -- \
                '.azure/deployments/*/metadata.json' \
                '.azure/deployments/*/state.json' 2>/dev/null || true)

              if [[ -z "$CHANGED_FILES" ]]; then
                echo "No deployment metadata changes"
                echo "##vso[task.setVariable variable=HAS_DESTROYS;isOutput=true]false"
                echo "##vso[task.setVariable variable=DEPLOYMENT_IDS;isOutput=true][]"
                exit 0
              fi

              DEPLOY_DIRS=$(echo "$CHANGED_FILES" | sed 's|.azure/deployments/\([^/]*\)/.*|\1|' | sort -u)

              DESTROY_IDS=""
              for DIR in $DEPLOY_DIRS; do
                METADATA=".azure/deployments/$DIR/metadata.json"
                if [[ -f "$METADATA" ]]; then
                  STATUS=$(jq -r '.status // ""' "$METADATA")
                  if [[ "$STATUS" == "destroy-requested" ]]; then
                    DESTROY_IDS="$DESTROY_IDS $DIR"
                    echo "Found destroy request: $DIR"
                  fi
                fi
              done

              if [[ -z "$DESTROY_IDS" ]]; then
                echo "##vso[task.setVariable variable=HAS_DESTROYS;isOutput=true]false"
                echo "##vso[task.setVariable variable=DEPLOYMENT_IDS;isOutput=true][]"
                exit 0
              fi

              IDS_JSON=$(echo "$DESTROY_IDS" | tr ' ' '\n' | grep -v '^$' \
                | jq -R -s -c 'split("\n") | map(select(. != ""))')
              echo "##vso[task.setVariable variable=HAS_DESTROYS;isOutput=true]true"
              echo "##vso[task.setVariable variable=DEPLOYMENT_IDS;isOutput=true]$IDS_JSON"
            displayName: 'Find destroy-requested deployments'
            name: find

  - stage: Destroy
    displayName: 'Destroy (gated)'
    dependsOn: Detect
    condition: eq(stageDependencies.Detect.detect_destroys.outputs['find.HAS_DESTROYS'], 'true')
    jobs:
      - deployment: destroy
        displayName: 'Destroy resource group'
        pool:
          vmImage: ubuntu-latest
        environment: azure-destroy
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  persistCredentials: true

                - download: none

                - task: AzureCLI@2
                  displayName: 'Delete resource groups sequentially'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      IDS_JSON='$(stageDependencies.Detect.detect_destroys.outputs.find.DEPLOYMENT_IDS)'

                      echo "$IDS_JSON" | jq -c '.[]' | while read -r RAW_ID; do
                        DEPLOYMENT_ID=$(echo "$RAW_ID" | jq -r '.')
                        DEPLOY_DIR=".azure/deployments/$DEPLOYMENT_ID"
                        STATE_FILE="$DEPLOY_DIR/state.json"

                        if [[ ! -f "$STATE_FILE" ]]; then
                          echo "##vso[task.logissue type=error]State not found for $DEPLOYMENT_ID"
                          continue
                        fi

                        RG=$(jq -r '.resourceGroup // empty' "$STATE_FILE")
                        if [[ -z "$RG" ]]; then
                          echo "##vso[task.logissue type=error]No resource group recorded for $DEPLOYMENT_ID"
                          continue
                        fi

                        EXISTS=$(az group exists --name "$RG")
                        TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

                        if [[ "$EXISTS" != "true" ]]; then
                          echo "Resource group $RG does not exist (already deleted?)"
                          STATUS="already-destroyed"
                        else
                          echo "🗑️ Deleting resource group: $RG"
                          START=$(date +%s)
                          if az group delete --name "$RG" --yes 2>&1; then
                            DURATION=$(( $(date +%s) - START ))
                            echo "✅ Deleted $RG in ${DURATION}s"
                            STATUS="destroyed"
                          else
                            echo "##vso[task.logissue type=error]Failed to delete $RG"
                            STATUS="destroy-failed"
                          fi
                        fi

                        # Update state and metadata
                        if [[ -f "$STATE_FILE" ]]; then
                          jq --arg s "$STATUS" --arg ts "$TIMESTAMP" --arg actor "$(Build.RequestedFor)" \
                            '. + {status: $s, destroyedAt: $ts, destroyedBy: $actor}' \
                            "$STATE_FILE" > "${STATE_FILE}.tmp" && mv "${STATE_FILE}.tmp" "$STATE_FILE"
                        fi
                        if [[ -f "$DEPLOY_DIR/metadata.json" ]]; then
                          jq --arg s "$STATUS" '.status = $s' \
                            "$DEPLOY_DIR/metadata.json" > "$DEPLOY_DIR/metadata.json.tmp" \
                            && mv "$DEPLOY_DIR/metadata.json.tmp" "$DEPLOY_DIR/metadata.json"
                        fi
                      done

                - bash: |
                    set -euo pipefail
                    git config user.name "Azure DevOps Build"
                    git config user.email "build@dev.azure.com"

                    git add .azure/deployments/*/state.json .azure/deployments/*/metadata.json 2>/dev/null || true
                    if git diff --cached --quiet; then
                      echo "No state changes to commit"
                      exit 0
                    fi

                    git commit -m "git-ape: mark deployments as destroyed [skip ci]"

                    REMOTE_URL="$(System.CollectionUri)$(System.TeamProject)/_git/$(Build.Repository.Name)"
                    REMOTE_URL="${REMOTE_URL// /%20}"

                    git -c http.extraHeader="Authorization: Bearer $(System.AccessToken)" \
                      push "$REMOTE_URL" "HEAD:refs/heads/main" \
                      || echo "##vso[task.logissue type=warning]Could not push destroy state update"
                  displayName: 'Commit state.json + metadata.json'
                  condition: succeededOrFailed()
                  env:
                    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
