# Git-Ape Deploy Pipeline (Azure DevOps)
# Triggers on merge to main when deployment artifacts change.
# Runs the actual ARM deployment, captures outputs, runs integration tests,
# and commits state.json back via $(System.AccessToken).
#
# Triggers:
#   - CI on main with .azure/deployments/**/template.json or parameters.json changes
#
# Gating:
#   - 'azure-deploy' ADO Environment with manual approval check replaces the
#     GitHub `/deploy` comment trigger.
#   - OIDC via Workload Identity Federation service connection 'git-ape-azdo-demo'.
#   - Variable group 'git-ape-azdo-demo-secrets' provides AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID.
#   - Build identity needs 'Contribute' permission on the repo to commit state.json.

name: 'git-ape-deploy-$(Date:yyyyMMdd)-$(Rev:r)'

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - .azure/deployments/**/template.json
      - .azure/deployments/**/parameters.json

pr: none

variables:
  - group: git-ape-azdo-demo-secrets
  - name: azureServiceConnection
    value: git-ape-azdo-demo

stages:
  - stage: Detect
    displayName: 'Detect deployments'
    jobs:
      - job: detect_deployments
        displayName: 'Detect deployments to execute'
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 0
            persistCredentials: true

          - bash: |
              set -euo pipefail
              CHANGED_FILES=$(git diff --name-only HEAD~1...HEAD -- \
                '.azure/deployments/*/template.json' 2>/dev/null || true)

              if [[ -z "$CHANGED_FILES" ]]; then
                echo "No deployments found"
                echo "##vso[task.setVariable variable=HAS_DEPLOYMENTS;isOutput=true]false"
                echo "##vso[task.setVariable variable=DEPLOYMENT_IDS;isOutput=true][]"
                exit 0
              fi

              DEPLOYMENT_IDS=$(echo "$CHANGED_FILES" \
                | sed 's|.azure/deployments/\([^/]*\)/.*|\1|' \
                | sort -u \
                | jq -R -s -c 'split("\n") | map(select(. != ""))')

              echo "Deployments to execute: $DEPLOYMENT_IDS"
              echo "##vso[task.setVariable variable=HAS_DEPLOYMENTS;isOutput=true]true"
              echo "##vso[task.setVariable variable=DEPLOYMENT_IDS;isOutput=true]$DEPLOYMENT_IDS"
            displayName: 'Find deployment directories'
            name: find

  - stage: Validate
    displayName: 'Validate templates'
    dependsOn: Detect
    condition: eq(stageDependencies.Detect.detect_deployments.outputs['find.HAS_DEPLOYMENTS'], 'true')
    jobs:
      - job: validate
        displayName: 'Validate'
        pool:
          vmImage: ubuntu-latest
        strategy:
          matrix: $[ stageDependencies.Detect.detect_deployments.outputs['find.DEPLOYMENT_IDS'] ]
        variables:
          deployment_id: ''
        steps:
          - checkout: self

          - bash: |
              set -euo pipefail
              DEPLOY_DIR=".azure/deployments/$(deployment_id)"
              if [[ ! -f "$DEPLOY_DIR/template.json" ]]; then
                echo "##vso[task.logissue type=error]Template not found: $DEPLOY_DIR/template.json"
                exit 1
              fi
              LOCATION=$(jq -r '.parameters.location.value // "eastus"' "$DEPLOY_DIR/parameters.json" 2>/dev/null || echo eastus)
              echo "##vso[task.setVariable variable=LOCATION]$LOCATION"
              echo "##vso[task.setVariable variable=DEPLOY_DIR]$DEPLOY_DIR"
            displayName: 'Read deployment parameters'

          - task: AzureCLI@2
            displayName: 'Validate ARM template'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                az deployment sub validate \
                  --location "$(LOCATION)" \
                  --template-file "$(DEPLOY_DIR)/template.json" \
                  --parameters @"$(DEPLOY_DIR)/parameters.json" \
                  --output json

  - stage: Deploy
    displayName: 'Deploy (gated)'
    dependsOn:
      - Detect
      - Validate
    condition: and(succeeded(), eq(stageDependencies.Detect.detect_deployments.outputs['find.HAS_DEPLOYMENTS'], 'true'))
    jobs:
      - deployment: deploy
        displayName: 'Deploy to Azure'
        pool:
          vmImage: ubuntu-latest
        environment: azure-deploy
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  persistCredentials: true

                - download: none

                - bash: |
                    set -euo pipefail
                    IDS_JSON='$(stageDependencies.Detect.detect_deployments.outputs.find.DEPLOYMENT_IDS)'
                    echo "$IDS_JSON" | jq -c '.[]' | while read -r RAW_ID; do
                      DEPLOYMENT_ID=$(echo "$RAW_ID" | jq -r '.')
                      DEPLOY_DIR=".azure/deployments/$DEPLOYMENT_ID"
                      LOCATION=$(jq -r '.parameters.location.value // "eastus"' "$DEPLOY_DIR/parameters.json" 2>/dev/null || echo eastus)
                      echo "Will deploy: $DEPLOYMENT_ID (location=$LOCATION)"
                    done
                  displayName: 'Resolve deployment list'

                - task: AzureCLI@2
                  displayName: 'Deploy ARM templates sequentially'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      IDS_JSON='$(stageDependencies.Detect.detect_deployments.outputs.find.DEPLOYMENT_IDS)'
                      OVERALL_STATUS="succeeded"

                      echo "$IDS_JSON" | jq -c '.[]' | while read -r RAW_ID; do
                        DEPLOYMENT_ID=$(echo "$RAW_ID" | jq -r '.')
                        DEPLOY_DIR=".azure/deployments/$DEPLOYMENT_ID"
                        LOCATION=$(jq -r '.parameters.location.value // "eastus"' "$DEPLOY_DIR/parameters.json" 2>/dev/null || echo eastus)

                        echo "🚀 Deploying $DEPLOYMENT_ID..."
                        START=$(date +%s)

                        DEPLOY_OUTPUT=$(az deployment sub create \
                          --name "$DEPLOYMENT_ID" \
                          --location "$LOCATION" \
                          --template-file "$DEPLOY_DIR/template.json" \
                          --parameters @"$DEPLOY_DIR/parameters.json" \
                          --output json 2>&1) || {
                            echo "##vso[task.logissue type=error]Deployment $DEPLOYMENT_ID failed"
                            echo "$DEPLOY_OUTPUT"
                            STATUS="failed"
                            DURATION=$(( $(date +%s) - START ))
                            cat > "$DEPLOY_DIR/state.json" <<EOF
                      {
                        "deploymentId": "$DEPLOYMENT_ID",
                        "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
                        "status": "$STATUS",
                        "duration": "${DURATION}s",
                        "subscription": "$(AZURE_SUBSCRIPTION_ID)",
                        "location": "$LOCATION",
                        "triggeredBy": "$(Build.RequestedFor)",
                        "runId": "$(Build.BuildId)",
                        "runUrl": "$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)"
                      }
                      EOF
                            continue
                          }

                        DURATION=$(( $(date +%s) - START ))
                        OUTPUTS=$(echo "$DEPLOY_OUTPUT" | jq -r '.properties.outputs // {}')
                        RG_NAME=$(echo "$OUTPUTS" | jq -r '.resourceGroupName.value // empty')

                        cat > "$DEPLOY_DIR/state.json" <<EOF
                      {
                        "deploymentId": "$DEPLOYMENT_ID",
                        "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
                        "status": "succeeded",
                        "duration": "${DURATION}s",
                        "subscription": "$(AZURE_SUBSCRIPTION_ID)",
                        "location": "$LOCATION",
                        "resourceGroup": "$RG_NAME",
                        "triggeredBy": "$(Build.RequestedFor)",
                        "runId": "$(Build.BuildId)",
                        "runUrl": "$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)"
                      }
                      EOF

                        echo "✅ Deployed $DEPLOYMENT_ID in ${DURATION}s (RG=$RG_NAME)"
                      done

                - task: AzureCLI@2
                  displayName: 'Run integration tests'
                  condition: succeededOrFailed()
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      IDS_JSON='$(stageDependencies.Detect.detect_deployments.outputs.find.DEPLOYMENT_IDS)'
                      echo "$IDS_JSON" | jq -c '.[]' | while read -r RAW_ID; do
                        DEPLOYMENT_ID=$(echo "$RAW_ID" | jq -r '.')
                        STATE_FILE=".azure/deployments/$DEPLOYMENT_ID/state.json"
                        [[ -f "$STATE_FILE" ]] || continue
                        RG=$(jq -r '.resourceGroup // empty' "$STATE_FILE")
                        [[ -n "$RG" ]] || continue

                        echo "Verifying resources in RG: $RG"
                        az resource list --resource-group "$RG" \
                          --query "[].{name:name, type:type, provisioningState:provisioningState}" \
                          --output table || true

                        # HTTP smoke test for ingress endpoints
                        ENDPOINTS=$(az resource list --resource-group "$RG" \
                          --query "[?type=='Microsoft.App/containerApps' || type=='Microsoft.Web/sites'].name" -o tsv)
                        for NAME in $ENDPOINTS; do
                          FQDN=$(az containerapp show -n "$NAME" -g "$RG" \
                            --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null \
                            || az webapp show -n "$NAME" -g "$RG" --query "defaultHostName" -o tsv 2>/dev/null \
                            || echo "")
                          if [[ -n "$FQDN" ]]; then
                            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://$FQDN" 2>/dev/null || echo "000")
                            echo "  $NAME → https://$FQDN → HTTP $HTTP_CODE"
                          fi
                        done
                      done

                - bash: |
                    set -euo pipefail
                    # Commit updated state.json/metadata.json back to main using $(System.AccessToken).
                    # Build identity needs 'Contribute' permission on the repo.
                    git config user.name "Azure DevOps Build"
                    git config user.email "build@dev.azure.com"

                    git add .azure/deployments/*/state.json .azure/deployments/*/metadata.json 2>/dev/null || true
                    if git diff --cached --quiet; then
                      echo "No state changes to commit"
                      exit 0
                    fi

                    git commit -m "git-ape: update deployment state [skip ci]"

                    REMOTE_URL="$(System.CollectionUri)$(System.TeamProject)/_git/$(Build.Repository.Name)"
                    REMOTE_URL="${REMOTE_URL// /%20}"

                    git -c http.extraHeader="Authorization: Bearer $(System.AccessToken)" \
                      push "$REMOTE_URL" "HEAD:refs/heads/main" \
                      || echo "##vso[task.logissue type=warning]Could not push state update to main"
                  displayName: 'Commit state.json'
                  condition: succeededOrFailed()
                  env:
                    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
