# Git-Ape Setup Verification Pipeline (Azure DevOps)
# Run manually after onboarding to verify OIDC, RBAC, and pipeline configuration.
#
# Triggers:
#   - Manual run only (no CI/PR triggers).
#
# Gating:
#   - Read-only Azure operations (account show, role list, validate empty template).
#   - OIDC via Workload Identity Federation service connection 'git-ape-azure'.
#   - Variable group 'git-ape-azure-secrets' provides AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID.

name: 'git-ape-verify-$(Date:yyyyMMdd)-$(Rev:r)'

trigger: none
pr: none

variables:
  - group: git-ape-azure-secrets
  - name: azureServiceConnection
    value: git-ape-azure

stages:
  - stage: Verify
    displayName: 'Verify Git-Ape configuration'
    jobs:
      - job: verify
        displayName: 'Verify'
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - bash: |
              set -euo pipefail
              MISSING=0
              for VAR in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID; do
                VAL=$(eval echo "\$$VAR")
                if [[ -z "$VAL" ]]; then
                  echo "##vso[task.logissue type=error]Missing variable: $VAR"
                  MISSING=$((MISSING + 1))
                else
                  echo "✅ $VAR is set"
                fi
              done
              echo "##vso[task.setVariable variable=MISSING_COUNT;isOutput=true]$MISSING"
            displayName: 'Check required variables'
            name: vars
            env:
              AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
              AZURE_TENANT_ID: $(AZURE_TENANT_ID)
              AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)

          - task: AzureCLI@2
            displayName: 'Verify Azure access (OIDC)'
            condition: eq(variables['vars.MISSING_COUNT'], '0')
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                echo "## Azure Connection"
                ACCOUNT=$(az account show -o json)
                SUB_NAME=$(echo "$ACCOUNT" | jq -r '.name')
                SUB_ID=$(echo "$ACCOUNT" | jq -r '.id')
                TENANT=$(echo "$ACCOUNT" | jq -r '.tenantId')
                echo "✅ Logged in successfully"
                echo "  Subscription: $SUB_NAME ($SUB_ID)"
                echo "  Tenant: $TENANT"

                echo ""
                echo "## RBAC Roles"
                SP_ID=$(az ad sp show --id "$(AZURE_CLIENT_ID)" --query id -o tsv 2>/dev/null || echo "")
                if [[ -n "$SP_ID" ]]; then
                  az role assignment list --assignee "$SP_ID" \
                    --query "[].{role:roleDefinitionName, scope:scope}" -o table
                else
                  echo "⚠️ Could not resolve service principal"
                fi

                echo ""
                echo "## Read Access Test"
                RG_COUNT=$(az group list --query "length(@)" -o tsv 2>/dev/null || echo "0")
                echo "✅ Can list resource groups ($RG_COUNT found)"

                echo ""
                echo "## Deployment Permission Test"
                cat > /tmp/empty-template.json <<'EOF'
                {
                  "$schema": "https://schema.management.azure.com/schemas/2018-05-01/subscriptionDeploymentTemplate.json#",
                  "contentVersion": "1.0.0.0",
                  "resources": []
                }
                EOF
                if az deployment sub validate \
                  --location eastus \
                  --template-file /tmp/empty-template.json \
                  --output json >/dev/null 2>&1; then
                  echo "✅ Subscription-level deployment validation passed"
                else
                  echo "##vso[task.logissue type=warning]Deployment validation failed — may lack Contributor role"
                fi

          - bash: |
              set -euo pipefail
              echo "## Pipeline Files"
              PIPELINES=(
                ".azure-pipelines/git-ape-plan.yml:Git-Ape: Plan"
                ".azure-pipelines/git-ape-deploy.yml:Git-Ape: Deploy"
                ".azure-pipelines/git-ape-destroy.yml:Git-Ape: Destroy"
                ".azure-pipelines/git-ape-verify.yml:Git-Ape: Verify Setup"
              )
              for P in "${PIPELINES[@]}"; do
                FILE=$(echo "$P" | cut -d: -f1)
                NAME=$(echo "$P" | cut -d: -f2-)
                if [[ -f "$FILE" ]]; then
                  echo "✅ $NAME ($FILE)"
                else
                  echo "⚠️ $NAME ($FILE) — not found"
                fi
              done
            displayName: 'Check pipeline files'
            condition: always()

          - bash: |
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              if [[ "$(vars.MISSING_COUNT)" != "0" ]]; then
                echo "❌ Setup incomplete — $(vars.MISSING_COUNT) variable(s) missing"
                echo "   Run: /git-ape-onboarding"
              else
                echo "✅ Git-Ape setup verified successfully!"
                echo ""
                echo "Next steps:"
                echo "  1. Add a deployment under .azure/deployments/"
                echo "  2. Open a PR to trigger the plan pipeline"
                echo "  3. Merge to main → deploy pipeline runs (gated by 'azure-deploy' environment)"
              fi
            displayName: 'Print summary'
            condition: always()
